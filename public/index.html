<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css"
        integrity="sha384-AYmEC3Yw5cVb3ZcuHtOA93w35dYTsvhLPVnYs9eStHfGJvOvKxVfELGroGkvsg+p" crossorigin="anonymous" />
    <link rel="stylesheet" href="/style.css">
    <script src="/script.js" defer></script>
</head>

<body>

    <div class="container">
        <div class="content">

            <div class="header-section">
                <div class="name-card">
                    <h1 id="professionalName">Kristin Lind</h1>
                </div>

                <div class="stage">
                    <div class="pyramid3d">
                        <div class="triangle side1"></div>
                        <div class="triangle side2"></div>
                        <div class="triangle side3"></div>
                        <div class="triangle side4"></div>
                    </div>
                </div>
            </div>

            <div class="flex-container">
                <div class="flex-child">
                    <img src="images/kristin_profile.webp" alt="Kristin Lind" id="professionalImage">
                </div>

            <div class="flex-child">
                <div id="primaryDescription" class="info-card">Web Developer & Designer
                </div>
            </div>
            </div>

        </div>
    </div>

</body>

</html>
